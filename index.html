        /* Nexus Floating Panel with Animated Border */
        #nexus-panel {

        }

        .nexus-inner {
            background: var(--dark-bg);
            width: 100%;
            height: 100%;
            clip-path: polygon(10% 0, 90% 0, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0 90%, 0 10%);
        }

        @keyframes borderRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .nexus-header {
            background: linear-gradient(90deg, transparent, var(--core-violet), transparent);

        .neural-status {

            text-shadow: 0 0 5px var(--core-cyan);

        .dot { width: 5px; height: 5px; background: var(--core-cyan); border-radius: 50%; animation: pulse 1s infinite; box-shadow: 0 0 10px var(--core-cyan); }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(2.5); } }

        .nexus-input {

            background: rgba(255,255,255,0.05);
            border: 1px solid var(--core-violet);
            padding: 8px;
            color: var(--core-cyan);
            font-size: 12px;
            margin-bottom: 10px;
            text-align: center;
            outline: none;
            box-shadow: inset 0 0 5px rgba(138, 43, 226, 0.3);
        }

        .nexus-btn {
            width: 100%;
            background: linear-gradient(45deg, var(--core-violet), #4b0082);
            border: none;
            color: white;
            padding: 10px;
            font-family: 'Audiowide', sans-serif;
            font-size: 9px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--core-violet);
            transition: 0.3s;
        }
        .nexus-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--core-cyan); }

        #prediction-core { display: none; }

        .result-display {
            background: rgba(0,0,0,0.6);
            border-radius: 8px;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
        }

        #sig-output {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 0 0 15px currentColor;
        }

        .timer-wrap {
            width: 100%;
            height: 6px;
            background: #111;
            margin-top: 8px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }
        #progress-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--core-violet), var(--core-cyan));
            transition: width 1s linear;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }

        .c-btn {

        #nexus-mini {

        @keyframes miniGlow {
            0%, 100% { box-shadow: 0 0 10px var(--core-violet); }

    <script>
        const KEY = "mehedivip";

        const panel = document.getElementById("nexus-panel");
        let isDragging = false, offset = [0,0];

        panel.addEventListener("touchstart", (e) => {
            if(e.target.closest('button, input, a')) return;
            isDragging = true;
            offset = [panel.offsetLeft - e.touches[0].clientX, panel.offsetTop - e.touches[0].clientY];
        }, {passive: true});

        document.addEventListener("touchmove", (e) => {
            if(!isDragging) return;
            panel.style.left = (e.touches[0].clientX + offset[0]) + "px";
            panel.style.top = (e.touches[0].clientY + offset[1]) + "px";
        }, {passive: true});

        document.addEventListener("touchend", () => isDragging = false);

        function initializeCore() {
            const input = document.getElementById("access-code").value;
            if(input === KEY) {
                document.getElementById("auth-phase").style.display = "none";
                document.getElementById("prediction-core").style.display = "block";
                runNexusEngine();
            } else {
                alert("ACCESS DENIED: INVALID CORE KEY");
            }
        }

        function minimizeNexus() {
            panel.style.display = "none";
            document.getElementById("nexus-mini").style.display = "flex";
        }

        function maximizeNexus() {
            panel.style.display = "block";
            document.getElementById("nexus-mini").style.display = "none";
        }

        function runNexusEngine() {
            const signals = [
                {t: "BIG [7,9]", c: "#00ffff"},
                {t: "SMALL [1,2]", c: "#8a2be2"},
                {t: "BIG [6,8]", c: "#00ffff"},
                {t: "SMALL [0,4]", c: "#8a2be2"},
                {t: "SMALL [3]", c: "#8a2be2"},
                {t: "BIG [5]", c: "#00ffff"}
            ];

            function tick() {
                const now = new Date();
                const ms = now.getTime();
                document.getElementById("nexus-clock").innerText = now.toLocaleTimeString();
                const countdown = 30 - (Math.floor(ms / 1000) % 30);
                document.getElementById("timer-num").innerText = countdown;
                const percent = (countdown / 30) * 100;
                document.getElementById("progress-fill").style.width = percent + "%";
                const cycle = Math.floor(ms / 30000);
                const data = signals[cycle % signals.length];
                const sigEl = document.getElementById("sig-output");
                if(sigEl.innerText !== data.t) {
                    sigEl.innerText = data.t;
                    sigEl.style.color = data.c;
                }
            }
            setInterval(tick, 1000);
            tick();
        }
    </script>
